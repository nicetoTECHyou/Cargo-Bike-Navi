<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CargoNavi Terminal v3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        *{margin:0;padding:0;box-sizing:border-box}

        :root{
            --c64-blue:#4040E0;
            --c64-lightblue:#6C6CFF;
            --c64-white:#FFFFFF;
            --c64-border:#6C5EB5;
            --c64-darkblue:#2020A0;
            --c64-cyan:#70D0D0;
            --c64-purple:#9060F0;
            --c64-green:#50C850;
            --c64-yellow:#F0D030;
            --c64-red:#E04040;
            --c64-grey:#808080;
            --c64-orange:#FF8844;
            --c64-brown:#A06020;
            --c64-ltgreen:#80FF80;
            --c64-ltblue:#8080FF;
            --monitor-body:#2c2c2c;
            --monitor-edge:#3a3a3a;
        }

        html,body{
            width:100%;height:100%;overflow:hidden;
            background:#0e0e1a;
        }

        body{
            display:flex;align-items:center;justify-content:center;
            font-family:'Press Start 2P',monospace;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(64,64,224,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(144,96,240,0.06) 0%, transparent 60%),
                linear-gradient(180deg, #0e0e1a 0%, #161628 50%, #0e0e1a 100%);
        }

        /* ══════════════════════════════════════════════
           CRT MONITOR SHELL — premium edition
           ══════════════════════════════════════════════ */
        .monitor{
            position:relative;
            width:96vw;max-width:1150px;
            aspect-ratio:16/11;
            max-height:90vh;
            background:var(--monitor-body);
            border-radius:30px;
            padding:20px 24px 50px;
            box-shadow:
                0 0 0 3px #111,
                0 0 0 6px #222,
                0 0 0 8px #333,
                0 25px 80px rgba(0,0,0,0.8),
                0 5px 20px rgba(64,64,224,0.1);
            display:flex;flex-direction:column;
        }

        /* Top ventilation slots */
        .monitor::before{
            content:'';position:absolute;top:8px;left:50%;
            transform:translateX(-50%);
            width:120px;height:3px;
            background:repeating-linear-gradient(
                90deg, #1a1a1a 0px, #1a1a1a 4px, #222 4px, #222 8px
            );
            border-radius:2px;
        }

        /* Bottom bezel with LED and label */
        .bezel-bottom{
            position:absolute;bottom:0;left:0;right:0;
            height:42px;
            background:linear-gradient(180deg, var(--monitor-body) 0%, #252525 100%);
            border-radius:0 0 28px 28px;
            display:flex;align-items:center;justify-content:space-between;
            padding:0 32px;
        }
        .bezel-label{
            color:#555;font-family:'Press Start 2P',monospace;
            font-size:6px;letter-spacing:2px;text-transform:uppercase;
        }
        .power-led{
            width:8px;height:8px;border-radius:50%;
            background:var(--c64-green);
            box-shadow:0 0 6px var(--c64-green), 0 0 12px var(--c64-green);
            animation:ledPulse 3s ease-in-out infinite;
        }
        @keyframes ledPulse{
            0%,100%{opacity:1;box-shadow:0 0 6px var(--c64-green),0 0 12px var(--c64-green)}
            50%{opacity:0.7;box-shadow:0 0 4px var(--c64-green),0 0 8px var(--c64-green)}
        }

        /* ══════════════════════════════════════════════
           SCREEN
           ══════════════════════════════════════════════ */
        .screen{
            flex:1;position:relative;overflow:hidden;
            background:var(--c64-blue);
            border-radius:16px;
            border:3px solid #0a0a0a;
            box-shadow:
                inset 0 0 100px rgba(0,0,0,0.35),
                inset 0 0 30px rgba(0,0,0,0.2),
                0 0 30px rgba(64,64,224,0.12);
        }

        /* Scanlines */
        .screen::before{
            content:'';position:absolute;inset:0;z-index:10;
            pointer-events:none;
            background:repeating-linear-gradient(
                0deg,
                transparent 0px,transparent 1px,
                rgba(0,0,0,0.06) 1px,rgba(0,0,0,0.06) 3px
            );
        }

        /* CRT vignette + curvature illusion */
        .screen::after{
            content:'';position:absolute;inset:0;z-index:11;
            pointer-events:none;
            background:
                radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.4) 100%);
        }

        /* Subtle flicker */
        @keyframes flicker{
            0%{opacity:0.975}4%{opacity:1}8%{opacity:0.985}
            12%{opacity:1}18%{opacity:0.975}50%{opacity:1}
            78%{opacity:0.985}92%{opacity:1}100%{opacity:0.975}
        }
        .screen{animation:flicker 5s infinite}

        /* Power-on animation */
        @keyframes poweron{
            0%{opacity:0;filter:brightness(4) saturate(0) contrast(0.5)}
            15%{opacity:1;filter:brightness(2.5) saturate(0.2) contrast(0.7)}
            40%{filter:brightness(1.5) saturate(0.6) contrast(0.9)}
            70%{filter:brightness(1.1) saturate(0.9) contrast(1)}
            100%{filter:brightness(1) saturate(1) contrast(1)}
        }
        .power-on{animation:poweron 1s ease-out}

        /* ══════════════════════════════════════════════
           TERMINAL CONTENT
           ══════════════════════════════════════════════ */
        .terminal{
            position:absolute;inset:0;z-index:5;
            padding:20px 28px;
            overflow-y:auto;
            scrollbar-width:none;
        }
        .terminal::-webkit-scrollbar{display:none}

        .line{
            margin:0 0 4px 0;
            white-space:pre-wrap;word-break:break-all;
            font-size:clamp(7px,1.2vw,12px);
            line-height:1.95;
            color:var(--c64-lightblue);
            min-height:1em;
        }

        .line.cyan{color:var(--c64-cyan)}
        .line.purple{color:var(--c64-purple)}
        .line.green{color:var(--c64-green)}
        .line.yellow{color:var(--c64-yellow)}
        .line.white{color:var(--c64-white)}
        .line.red{color:var(--c64-red)}
        .line.grey{color:var(--c64-grey)}
        .line.orange{color:var(--c64-orange)}
        .line.brown{color:var(--c64-brown)}
        .line.ltgreen{color:var(--c64-ltgreen)}
        .line.ltblue{color:var(--c64-ltblue)}

        /* Blinking cursor */
        .cursor{
            display:inline-block;
            width:clamp(7px,1vw,11px);
            height:clamp(9px,1.3vw,14px);
            background:var(--c64-lightblue);
            vertical-align:text-bottom;
            animation:blink .4s step-end infinite;
        }
        @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

        /* Loading bar */
        .load-bar{
            display:inline-block;
            color:var(--c64-cyan);
            letter-spacing:1px;
        }

        /* ══════════════════════════════════════════════
           RAINBOW BAR (C64 startup color test)
           ══════════════════════════════════════════════ */
        .rainbow-bar{
            display:flex;height:10px;
            border:1px solid rgba(255,255,255,0.15);
            border-radius:2px;overflow:hidden;
            margin:6px 0;
        }
        .rainbow-bar div{
            flex:1;
            animation:rainbowIn 0.3s ease-out forwards;
            opacity:0;
        }
        @keyframes rainbowIn{to{opacity:1}}

        /* ══════════════════════════════════════════════
           FEATURE CARDS inside terminal
           ══════════════════════════════════════════════ */
        .feature-box{
            border:1px solid var(--c64-purple);
            background:rgba(144,96,240,0.06);
            border-radius:4px;
            padding:10px 16px;
            margin:8px 0;
            opacity:0;
            transform:translateY(6px);
            transition:opacity 0.4s, transform 0.4s;
        }
        .feature-box.visible{
            opacity:1;transform:translateY(0);
        }
        .feature-box .feat-title{
            font-size:clamp(7px,1.1vw,11px);
            line-height:2;
            margin-bottom:4px;
        }
        .feature-box .feat-desc{
            font-size:clamp(6px,0.95vw,10px);
            line-height:1.9;
            color:var(--c64-grey);
        }

        /* ══════════════════════════════════════════════
           MENU
           ══════════════════════════════════════════════ */
        .menu-choice{
            padding:12px 18px;margin:5px 0;
            cursor:pointer;
            border:2px solid transparent;
            border-radius:6px;
            transition:all .2s;
            font-size:clamp(8px,1.2vw,12px);
            line-height:2;
            color:var(--c64-lightblue);
            position:relative;
            overflow:hidden;
        }
        .menu-choice::before{
            content:'';position:absolute;inset:0;
            background:linear-gradient(90deg,transparent,rgba(108,108,255,0.05),transparent);
            transform:translateX(-100%);
            transition:transform .4s;
        }
        .menu-choice:hover::before{transform:translateX(100%)}
        .menu-choice:hover{
            border-color:var(--c64-cyan);
            background:rgba(112,208,208,0.06);
            color:var(--c64-cyan);
            text-shadow:0 0 10px rgba(112,208,208,0.5);
            box-shadow:0 0 15px rgba(112,208,208,0.1);
        }
        .menu-choice:active{
            transform:scale(0.98);
        }

        /* Skip button */
        .skip-btn{
            position:absolute;top:10px;right:14px;z-index:20;
            font-family:'Press Start 2P',monospace;
            font-size:7px;
            color:var(--c64-grey);
            background:rgba(0,0,0,0.3);
            border:1px solid var(--c64-grey);
            padding:5px 10px;cursor:pointer;
            border-radius:4px;
            transition:all .2s;
            backdrop-filter:blur(4px);
        }
        .skip-btn:hover{
            color:var(--c64-white);border-color:var(--c64-white);
            box-shadow:0 0 8px rgba(255,255,255,0.15);
        }

        /* Glow line */
        .glow-line{
            height:1px;margin:8px 0;
            background:linear-gradient(90deg,
                transparent 0%,
                var(--c64-cyan) 20%,
                var(--c64-purple) 50%,
                var(--c64-cyan) 80%,
                transparent 100%
            );
            opacity:0.5;
        }

        /* ══════════════════════════════════════════════
           RESPONSIVE
           ══════════════════════════════════════════════ */
        @media(max-width:700px){
            .monitor{
                width:100vw;height:100vh;
                aspect-ratio:auto;
                border-radius:0;padding:8px 10px 36px;
                max-height:100vh;
            }
            .terminal{padding:10px 12px}
            .line{font-size:7px;line-height:1.85}
            .menu-choice{padding:8px 12px}
            .feature-box{padding:6px 10px}
            .bezel-bottom{padding:0 16px;height:32px}
        }

        @media(prefers-reduced-motion:reduce){
            .screen{animation:none}
            .power-on{animation:none}
            .power-led{animation:none}
        }
    </style>
</head>
<body>

<div class="monitor">
    <div class="screen power-on" id="screen">
        <button class="skip-btn" id="skipBtn" style="display:none">SKIP &#9654;&#9654;</button>
        <div class="terminal" id="terminal"></div>
    </div>
    <div class="bezel-bottom">
        <span class="bezel-label">nicetoTECHyou systems</span>
        <div class="power-led" id="powerLed"></div>
        <span class="bezel-label">model C64-GH</span>
    </div>
</div>

<script>
(function(){
    // ============================================================
    // CONFIG
    // ============================================================
    const CONFIG = {
        githubUrl:    "https://github.com/nicetoTECHyou",
        cargoNavUrl:  "navigation_v3.html",
        loadText:     "CARGONAVI SYSTEM",
        userName:     "GUEST",
    };

    const $ = id => document.getElementById(id);
    const terminal = $("terminal");
    const screen   = $("screen");
    const skipBtn  = $("skipBtn");
    const powerLed = $("powerLed");
    let aborted = false;

    // ============================================================
    // HELPERS
    // ============================================================
    function sleep(ms){ return new Promise(r => setTimeout(r, ms)) }

    function addLine(text="", cls=""){
        const div = document.createElement("div");
        div.className = "line" + (cls ? " "+cls : "");
        div.innerHTML = text;
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
        return div;
    }

    function addEmpty(){ addLine("&nbsp;") }

    function addGlowLine(){
        const d = document.createElement("div");
        d.className = "glow-line";
        terminal.appendChild(d);
    }

    function typeText(container, text, speed=50){
        return new Promise(resolve => {
            let i = 0;
            const cursor = document.createElement("span");
            cursor.className = "cursor";
            container.appendChild(cursor);
            function tick(){
                if(aborted){ container.textContent = text; resolve(); return }
                if(i < text.length){
                    container.insertBefore(
                        document.createTextNode(text[i]), cursor
                    );
                    i++;
                    terminal.scrollTop = terminal.scrollHeight;
                    setTimeout(tick, speed + Math.random()*25);
                } else {
                    cursor.remove();
                    resolve();
                }
            }
            tick();
        });
    }

    function loadingBar(container, count=36, speed=40){
        return new Promise(resolve => {
            let i = 0;
            container.textContent = "";
            function tick(){
                if(aborted){ container.textContent = "█".repeat(count); resolve(); return }
                if(i < count){
                    container.textContent += "█";
                    i++;
                    terminal.scrollTop = terminal.scrollHeight;
                    setTimeout(tick, speed + Math.random()*15);
                } else { resolve() }
            }
            tick();
        });
    }

    function addFeatureBox(icon, title, desc, color){
        const box = document.createElement("div");
        box.className = "feature-box";
        box.innerHTML =
            '<div class="feat-title" style="color:'+color+'">'+icon+' '+title+'</div>' +
            '<div class="feat-desc">'+desc+'</div>';
        terminal.appendChild(box);
        terminal.scrollTop = terminal.scrollHeight;
        return box;
    }

    function addRainbowBar(){
        const bar = document.createElement("div");
        bar.className = "rainbow-bar";
        const colors = [
            "#000000","#FFFFFF","#FF0000","#00FF00","#0000FF",
            "#AA00AA","#00AAAA","#AAAA00","#FF8800","#888888",
            "#CC4444","#44CC44","#4444CC","#CC44CC","#44CCCC","#CCCC44"
        ];
        colors.forEach((c,i) => {
            const d = document.createElement("div");
            d.style.background = c;
            d.style.animationDelay = (i * 0.04) + "s";
            bar.appendChild(d);
        });
        terminal.appendChild(bar);
    }

    // ============================================================
    // BOOT SEQUENCE
    // ============================================================
    async function boot(){
        skipBtn.style.display = "block";

        // Power LED off → on
        powerLed.style.background = "#333";
        powerLed.style.boxShadow = "none";
        await sleep(400);
        powerLed.style.background = "var(--c64-green)";
        powerLed.style.boxShadow = "0 0 6px var(--c64-green), 0 0 12px var(--c64-green)";

        // ── Phase 1: C64 Classic Boot ──
        addEmpty();
        addLine("    **** COMMODORE 64 BASIC V2 ****", "white");
        addEmpty();
        addLine(" 64K RAM SYSTEM  38911 BASIC BYTES FREE", "white");
        addEmpty();
        addLine("READY.", "cyan");
        await sleep(700);

        // ── Phase 2: LOAD Command ──
        addEmpty();
        const loadLine = addLine("", "");
        await typeText(loadLine, 'LOAD "' + CONFIG.loadText + '",8,1', 65);
        await sleep(350);

        // ── Phase 3: SEARCHING ──
        addLine("SEARCHING FOR " + CONFIG.loadText, "grey");
        await sleep(1000);

        // ── Phase 4: LOADING ──
        addEmpty();
        const loadBarLine = addLine("LOADING", "");
        const barSpan = document.createElement("span");
        barSpan.className = "load-bar";
        loadBarLine.appendChild(document.createTextNode(" "));
        loadBarLine.appendChild(barSpan);
        await loadingBar(barSpan, 36, 45);
        addEmpty();
        addLine("READY.", "cyan");
        await sleep(500);

        // ── Phase 5: RUN ──
        addEmpty();
        const runLine = addLine("", "");
        await typeText(runLine, "RUN", 75);
        await sleep(600);

        // Screen flash on RUN
        screen.style.transition = "filter 0.15s";
        screen.style.filter = "brightness(2)";
        await sleep(120);
        screen.style.filter = "brightness(1)";
        await sleep(300);

        // ── Phase 6: System Init ──
        addEmpty();

        // Rainbow color test bar
        addRainbowBar();
        await sleep(300);

        addEmpty();

        addLine("╔══════════════════════════════════════════════════╗", "cyan");
        addLine("║                                                  ║", "cyan");
        addLine("║", "cyan");
        addLine(
            '<span style="color:var(--c64-cyan)">║</span>' +
            '<span style="color:var(--c64-green)">    ╔╦╗╔═╗╔╗ ╔═╗╔═╗╔═╗  ╔═╗╔╗╔╔═╗╔═╗╔═╗</span>' +
            '<span style="color:var(--c64-cyan)">    </span>' +
            '<span style="color:var(--c64-cyan)">║</span>', ""
        );
        addLine(
            '<span style="color:var(--c64-cyan)">║</span>' +
            '<span style="color:var(--c64-green)">    ║║║║╣ ╠╩╗║╣ ║  ╠═╣  ║ ║║║║║╣ ║  ║╣ </span>' +
            '<span style="color:var(--c64-cyan)">    </span>' +
            '<span style="color:var(--c64-cyan)">║</span>', ""
        );
        addLine(
            '<span style="color:var(--c64-cyan)">║</span>' +
            '<span style="color:var(--c64-green)">    ╩ ╩╚═╝╚═╝╚═╝╚═╝╩ ╩  ╚═╝╝╚╝╚═╝╚═╝╚═╝</span>' +
            '<span style="color:var(--c64-cyan)">    </span>' +
            '<span style="color:var(--c64-cyan)">║</span>', ""
        );
        addLine("║", "cyan");
        addLine(
            '<span style="color:var(--c64-cyan)">║</span>' +
            '<span style="color:var(--c64-cyan)">          </span>' +
            '<span style="color:var(--c64-yellow)">N A V I   v 3 . 0</span>' +
            '<span style="color:var(--c64-cyan)">            </span>' +
            '<span style="color:var(--c64-cyan)">║</span>', ""
        );
        addLine("║                                                  ║", "cyan");
        addLine("╚══════════════════════════════════════════════════╝", "cyan");

        addEmpty();
        addGlowLine();

        // System init lines
        const initLines = [
            "INITIALIZING KERNEL.................. [OK]",
            "MOUNTING FILE SYSTEM.................. [OK]",
            "LOADING NETWORK DRIVERS............... [OK]",
            "CONNECTING GITHUB API................. [OK]",
            "CARGONAVI NAVIGATION MODULES......... [OK]",
            "SPEECH SYNTHESIS ENGINE............... [OK]",
            "VEHICLE PROFILES LOADED.............. [OK]",
        ];

        for(const text of initLines){
            if(aborted) break;
            const el = addLine(text, "green");
            el.style.opacity = "0";
            await sleep(120);
            el.style.transition = "opacity 0.15s";
            el.style.opacity = "1";
        }

        await sleep(300);
        addLine("ALL SYSTEMS NOMINAL.", "green");
        await sleep(500);

        // ── Phase 7: CargoNavi Info ──
        addEmpty();
        addGlowLine();
        addEmpty();
        addLine("   SYSTEM INFO: CARGONAVI NAVIGATION", "yellow");
        addEmpty();

        const features = [
            {
                icon: ">>",
                title: "GPS NAVIGATION",
                desc: "Echte GPS-Navigation in Echtzeit  |  Satellitenkarte & 4 Kartenstile  |  Demo-Modus zum virtuellen Abfahren  |  Bis zu 3 Alternativrouten  |  Hohenprofil & Auto-Arrival",
                color: "var(--c64-cyan)"
            },
            {
                icon: ">>",
                title: "SPRACHNAVIGATION",
                desc: "Turn-by-Turn Ansagen (Deutsch & Englisch)  |  Lautstarke & Sprechtempo einstellbar",
                color: "var(--c64-green)"
            },
            {
                icon: ">>",
                title: "FAHRZEUGPROFILE",
                desc: "Lastenrad (FRANKY)  |  Mountain Bike  |  Racing Bike  |  DeLorean",
                color: "var(--c64-orange)"
            },
            {
                icon: ">>",
                title: "POIs & EXPORT",
                desc: "EV Ladestationen, Campingplatze & Sehenswurdigkeiten  |  Adresssuche & Wegpunkte per Klick  |  Export: GPX, KML, TCX, CSV",
                color: "var(--c64-purple)"
            },
            {
                icon: ">>",
                title: "PLATTFORM & DESIGN",
                desc: "100% Open Source  |  Kein App Store, kein Backend, keine Kosten  |  PWA installierbar  |  Dark Mode  |  Vollbild  |  Responsive Design",
                color: "var(--c64-yellow)"
            },
        ];

        for(const f of features){
            if(aborted) break;
            const box = addFeatureBox(f.icon, f.title, f.desc, f.color);
            await sleep(200);
            box.classList.add("visible");
            await sleep(350);
        }

        await sleep(500);

        // ── Phase 8: Welcome & Menu ──
        addEmpty();
        addGlowLine();
        addEmpty();

        addLine("WILLKOMMEN, " + CONFIG.userName + "!", "white");
        await sleep(600);

        addEmpty();
        addLine("╔══════════════════════════════════════════════════╗", "purple");
        addLine("║            WAHLE DEIN ZIEL:                      ║", "purple");
        addLine("╚══════════════════════════════════════════════════╝", "purple");
        addEmpty();

        addLine("   [1] GITHUB PROFILE", "cyan");
        addLine("       Repos, Code & mehr von nicetoTECHyou", "grey");
        addEmpty();
        addLine("   [2] CARGONAVI NAVIGATION", "cyan");
        addLine("       Dein Lastenrad-Navi — direkt im Browser", "grey");
        addEmpty();

        skipBtn.style.display = "none";
        await showMenu();
    }

    // ============================================================
    // INTERACTIVE MENU
    // ============================================================
    async function showMenu(){
        addLine("  DRUCKE [1] FUR GITHUB ODER [2] FUR CARGONAVI", "yellow");
        addLine("  (ENTER = GITHUB)                                 ", "yellow");

        const inputLine = addLine("", "");
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        inputLine.appendChild(cursor);

        const choices = [
            { num: "1", label: "GITHUB PROFILE", url: CONFIG.githubUrl },
            { num: "2", label: "CARGONAVI NAVIGATION", url: CONFIG.cargoNavUrl },
        ];

        function handleKey(e){
            if(e.key === "1"){
                cleanup();
                confirmChoice(choices[0]);
            } else if(e.key === "2"){
                cleanup();
                confirmChoice(choices[1]);
            } else if(e.key === "Enter"){
                cleanup();
                confirmChoice(choices[0]);
            }
        }
        function cleanup(){
            document.removeEventListener("keydown", handleKey);
        }
        document.addEventListener("keydown", handleKey);

        // Clickable menu items
        for(let i = 0; i < choices.length; i++){
            const div = document.createElement("div");
            div.className = "menu-choice";
            const descs = [
                "Repos, Code & mehr von nicetoTECHyou",
                "Dein Lastenrad-Navi — direkt im Browser"
            ];
            div.innerHTML =
                '<span style="color:var(--c64-yellow)">[' + choices[i].num + ']</span>  ' +
                '<span style="color:var(--c64-cyan)">' + choices[i].label + '</span>' +
                '<br><span style="color:var(--c64-grey);font-size:clamp(6px,0.9vw,9px)">' +
                descs[i] + '</span>';
            div.addEventListener("click", function(){
                cleanup();
                confirmChoice(choices[i]);
            });
            terminal.appendChild(div);
        }
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function confirmChoice(choice){
        addEmpty();
        addLine("LADE " + choice.label + "...", "cyan");
        await sleep(350);

        const initLines = [
            "RESOLVING TARGET....................  [OK]",
            "ESTABLISHING CONNECTION.............  [OK]",
        ];
        for(const text of initLines){
            const el = addLine(text, "green");
            el.style.opacity = "0";
            await sleep(150);
            el.style.transition = "opacity 0.15s";
            el.style.opacity = "1";
        }

        await sleep(400);
        addLine("FERTIG! WEITERLEITUNG...", "green");
        await sleep(400);

        // Flash transition
        screen.style.transition = "filter 0.6s";
        screen.style.filter = "brightness(4)";
        await sleep(400);
        window.location.href = choice.url;
    }

    // ============================================================
    // SKIP
    // ============================================================
    skipBtn.addEventListener("click", async function(){
        aborted = true;
        skipBtn.style.display = "none";
        terminal.innerHTML = "";

        addEmpty();
        addLine("    **** COMMODORE 64 BASIC V2 ****", "white");
        addEmpty();
        addLine("READY.", "cyan");
        addEmpty();
        addLine('LOAD "' + CONFIG.loadText + '",8,1', "");
        addLine("READY.", "cyan");
        addLine("RUN", "");
        addEmpty();

        addRainbowBar();
        addEmpty();

        addLine("WILLKOMMEN, " + CONFIG.userName + "!", "white");
        addEmpty();

        addLine("╔══════════════════════════════════════════════════╗", "purple");
        addLine("║            WÄHLE DEIN ZIEL:                      ║", "purple");
        addLine("╚══════════════════════════════════════════════════╝", "purple");
        addEmpty();

        addLine("   [1] GITHUB PROFILE", "cyan");
        addLine("       Repos, Code & mehr von nicetoTECHyou", "grey");
        addEmpty();
        addLine("   [2] CARGONAVI NAVIGATION", "cyan");
        addLine("       Dein Lastenrad-Navi — direkt im Browser", "grey");
        addEmpty();

        await showMenu();
    });

    // ============================================================
    // START
    // ============================================================
    document.addEventListener("click", function(){ document.body.focus() });
    document.body.setAttribute("tabindex", "0");
    document.body.focus();
    boot();
})();
</script>
</body>
